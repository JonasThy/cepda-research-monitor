name: Cepda Daily Research Scan

on:
  schedule:
    - cron: '0 7 * * *'  # 07:00 UTC = 09:00 CEST (08:00 CET)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print results without updating the feed)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python src/main.py

      - name: Commit updated feed and seen list
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Cepda Bot"
          git add data/seen_web.json docs/data/feed.json
          git diff --staged --quiet || git commit -m "chore: update feed [skip ci]"
          git push
